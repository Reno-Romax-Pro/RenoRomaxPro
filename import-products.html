<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Products from CSV | Reno-Romax-Pro</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="./favicon/favicon-96x96.png" />
  <link rel="icon" type="image/x-icon" href="./favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 800px;
      width: 100%;
      padding: 2.5rem;
    }
    h1 {
      color: #1f2937;
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      color: #6b7280;
      text-align: center;
      margin-bottom: 2rem;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-box {
      background: #f3f4f6;
      padding: 1rem;
      border-radius: 0.75rem;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #4f46e5;
    }
    .stat-label {
      color: #6b7280;
      font-size: 0.875rem;
    }
    .btn {
      width: 100%;
      padding: 1rem 2rem;
      font-size: 1.125rem;
      font-weight: 600;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .progress-container {
      margin-top: 2rem;
      display: none;
    }
    .progress-bar {
      height: 12px;
      background: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      text-align: center;
      margin-top: 0.75rem;
      color: #4b5563;
      font-weight: 500;
    }
    .log {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f9fafb;
      border-radius: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.875rem;
      display: none;
    }
    .log-entry {
      padding: 0.25rem 0;
      border-bottom: 1px solid #e5e7eb;
    }
    .log-success { color: #059669; }
    .log-error { color: #dc2626; }
    .log-info { color: #4b5563; }
    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }
    .btn-secondary:hover {
      background: #d1d5db;
    }
    .success-message {
      display: none;
      text-align: center;
      padding: 2rem;
      background: #d1fae5;
      border-radius: 0.75rem;
      margin-top: 1.5rem;
    }
    .success-message h2 {
      color: #065f46;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .success-message p {
      color: #047857;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Import Products from CSV</h1>
    <p class="subtitle">Import all 208 products from products.csv into your catalog</p>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="csvCount">-</div>
        <div class="stat-label">Products in CSV</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="currentCount">-</div>
        <div class="stat-label">Currently Stored</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="toImport">-</div>
        <div class="stat-label">To Import</div>
      </div>
    </div>

    <button class="btn btn-primary" id="importBtn" onclick="startImport()">
      Start Import
    </button>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="log" id="log"></div>

    <div class="success-message" id="successMessage">
      <h2>Import Complete!</h2>
      <p id="successText"></p>
      <div class="actions" style="justify-content: center; margin-top: 1.5rem;">
        <a href="catalog.html" class="btn btn-primary" style="width: auto; text-decoration: none; display: inline-block;">View Catalog</a>
        <a href="admin.html" class="btn btn-secondary" style="width: auto; text-decoration: none; display: inline-block;">Go to Admin</a>
      </div>
    </div>
  </div>

  <script>
    let csvProducts = [];
    let storedProducts = [];

    // Load and display stats on page load
    window.onload = async function() {
      await loadStats();
    };

    async function loadStats() {
      try {
        // Fetch CSV file
        const response = await fetch('products.csv');
        const csvText = await response.text();
        csvProducts = parseCSV(csvText);
        
        // Get stored products
        const stored = localStorage.getItem('reno_romax_data');
        if (stored) {
          const data = JSON.parse(stored);
          storedProducts = data.products || [];
        }

        // Update stats
        document.getElementById('csvCount').textContent = csvProducts.length;
        document.getElementById('currentCount').textContent = storedProducts.length;
        document.getElementById('toImport').textContent = csvProducts.length;
        
        log(`Found ${csvProducts.length} products in CSV file`, 'info');
        log(`Currently have ${storedProducts.length} products stored`, 'info');
      } catch (error) {
        log('Error loading stats: ' + error.message, 'error');
      }
    }

    function parseCSV(content) {
      const rows = [];
      let currentRow = [];
      let currentField = '';
      let inQuotes = false;
      let i = 0;

      while (i < content.length) {
        const char = content[i];
        const nextChar = content[i + 1];

        if (inQuotes) {
          if (char === '"' && nextChar === '"') {
            currentField += '"';
            i += 2;
          } else if (char === '"') {
            inQuotes = false;
            i++;
          } else {
            currentField += char;
            i++;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
            i++;
          } else if (char === ',') {
            currentRow.push(currentField.trim());
            currentField = '';
            i++;
          } else if (char === '\n' || char === '\r') {
            if (currentField.length > 0 || currentRow.length > 0) {
              currentRow.push(currentField.trim());
              if (currentRow.some(f => f.length > 0)) {
                rows.push(currentRow);
              }
              currentRow = [];
              currentField = '';
            }
            i++;
            if (char === '\r' && content[i] === '\n') i++;
          } else {
            currentField += char;
            i++;
          }
        }
      }

      if (currentField.length > 0 || currentRow.length > 0) {
        currentRow.push(currentField.trim());
        if (currentRow.some(f => f.length > 0)) {
          rows.push(currentRow);
        }
      }

      // Parse rows into product objects
      if (rows.length < 2) return [];

      const headers = rows[0].map(h => h.toLowerCase().trim());
      
      const colIndex = {
        handle: headers.findIndex(h => h === 'handle'),
        title: headers.findIndex(h => h === 'title'),
        body: headers.findIndex(h => h.includes('body') || h.includes('description')),
        price: headers.findIndex(h => h.includes('variant price') || h === 'price'),
        image: headers.findIndex(h => h.includes('image src') || h === 'image'),
        category: headers.findIndex(h => h.includes('product category') || h.includes('category') || h.includes('type')),
        status: headers.findIndex(h => h === 'status')
      };

      const products = [];
      
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (row.length < 3) continue;

        const handle = colIndex.handle >= 0 ? row[colIndex.handle] : '';
        const title = colIndex.title >= 0 ? row[colIndex.title] : '';
        const body = colIndex.body >= 0 ? row[colIndex.body] : '';
        const priceStr = colIndex.price >= 0 ? row[colIndex.price] : '0';
        const image = colIndex.image >= 0 ? row[colIndex.image] : '';
        const category = colIndex.category >= 0 ? row[colIndex.category] : '';
        const status = colIndex.status >= 0 ? row[colIndex.status] : 'active';

        if (!handle || !title) continue;
        if (status.toLowerCase() === 'draft') continue;

        const price = parseFloat(priceStr) || 0;

        products.push({
          handle,
          title,
          description: stripHtml(body),
          price,
          image,
          category,
          created_at: new Date().toISOString()
        });
      }

      return products;
    }

    function stripHtml(html) {
      if (!html) return '';
      return html
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/p>/gi, '\n')
        .replace(/<\/li>/gi, '\n')
        .replace(/<li>/gi, '• ')
        .replace(/<[^>]*>/g, '')
        .replace(/&nbsp;/g, ' ')
        .replace(/&amp;/g, '&')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"')
        .replace(/&#39;/g, "'")
        .replace(/\s+/g, ' ')
        .trim();
    }

    async function startImport() {
      const btn = document.getElementById('importBtn');
      const progressContainer = document.getElementById('progressContainer');
      const logDiv = document.getElementById('log');
      
      btn.disabled = true;
      btn.textContent = 'Importing...';
      progressContainer.style.display = 'block';
      logDiv.style.display = 'block';

      const productsWithImages = csvProducts.filter(p => p.image && p.image.trim() !== '');
      const total = productsWithImages.length;
      let imported = 0;
      let errors = 0;

      log(`Starting import of ${total} products with images...`, 'info');

      // Get existing data or create new
      const stored = localStorage.getItem('reno_romax_data');
      const data = stored ? JSON.parse(stored) : { categories: [], products: [] };
      
      // Create a map of existing products
      const existingMap = new Map(data.products.map(p => [p.handle, p]));

      // Process products in batches
      const batchSize = 10;
      for (let i = 0; i < productsWithImages.length; i += batchSize) {
        const batch = productsWithImages.slice(i, i + batchSize);
        
        for (const product of batch) {
          try {
            existingMap.set(product.handle, product);
            imported++;
            log(`Imported: ${product.title}`, 'success');
          } catch (error) {
            errors++;
            log(`Error importing ${product.title}: ${error.message}`, 'error');
          }
        }

        // Update progress
        const progress = Math.round((imported / total) * 100);
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = `${progress}% (${imported}/${total})`;

        // Small delay to allow UI to update
        await new Promise(resolve => setTimeout(resolve, 10));
      }

      // Convert map back to array
      data.products = Array.from(existingMap.values());
      
      // Extract unique categories
      const categories = [...new Set(data.products.map(p => p.category).filter(Boolean))];
      data.categories = categories;

      // Save to localStorage
      localStorage.setItem('reno_romax_data', JSON.stringify(data));

      log(`Import complete! Imported ${imported} products, ${errors} errors`, 'info');
      log(`Total products in storage: ${data.products.length}`, 'info');

      // Show success message
      document.getElementById('successMessage').style.display = 'block';
      document.getElementById('successText').textContent = `Successfully imported ${imported} products! Your catalog now has ${data.products.length} products.`;
      
      btn.textContent = 'Import Complete';
    }

    function log(message, type) {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }
  </script>
</body>
</html>
